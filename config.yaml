llm:
  provider: "ollama"
  base_url: "http://localhost:11434"
  api_key: "${OPENAI_API_KEY}"
  model: "qwen3.5:4b"
  temperature: 0.3
  max_tokens: 4096
  retry_count: 2
  think: false
  debug: false
  batch_size: 50
  max_workers: 4
  timeout: 300

excel:
  action_column_candidates:
    - "操作类型"
    - "操作"
    - "变更事项"
    - "变更类型"
  app_column_candidates:
    - "APPID"
    - "应用"
    - "应用名称"
  skip_sheets:
    - "变更安排"
    - "变更前准备"
  large_sheet_threshold: 200

mapping:
  rules_file: "./mapping_rules.md"

word:
  output_dir: "./output"
